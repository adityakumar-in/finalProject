services:
  mysql:
    image: mysql:8.4
    container_name: employee-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: employee_db
      MYSQL_USER: employee_user
      MYSQL_PASSWORD: employee_password
    # ports:
    #   - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: employee-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: employee_user
      DB_PASSWORD: employee_password
      DB_NAME: employee_db
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: employee-frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: employee-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql-data:
